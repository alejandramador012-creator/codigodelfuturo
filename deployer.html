async function deploy() {
  try {
    log("📋 Creating deploy with file manifest...");
    
    // Step 1: Create deploy with file hashes
    const deployResp = await fetch(`https://api.netlify.com/api/v1/sites/${SITE_ID}/deploys`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ files: MANIFEST })
    });
    const deploy = await deployResp.json();
    
    if (!deploy.id) {
      log("ERROR creating deploy: " + JSON.stringify(deploy), "error");
      return;
    }
    
    const deployId = deploy.id;
    const required = deploy.required || [];
    log(`✓ Deploy created: ${deployId}`);
    log(`✓ Files required to upload: ${required.length}`);
    
    // Build lookup: sha1 -> filepath
    const sha1ToPath = {};
    for (const [path, sha1] of Object.entries(MANIFEST)) {
      sha1ToPath[sha1] = path;
    }
    
    // Step 2: Upload each required file
    let uploaded = 0;
    for (const sha1 of required) {
      const filePath = sha1ToPath[sha1];
      if (!filePath) {
        log(`⚠ Unknown SHA1: ${sha1}`, "error");
        continue;
      }
      
      const b64 = FILES_B64[filePath];
      if (!b64) {
        log(`⚠ No data for: ${filePath}`, "error");
        continue;
      }
      
      // Decode base64 to binary
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      
      // Determine content type
      const ext = filePath.split('.').pop().toLowerCase();
      const contentTypes = {
        'html': 'text/html', 'css': 'text/css', 'js': 'application/javascript',
        'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg'
      };
      const ct = contentTypes[ext] || 'application/octet-stream';
      
      const uploadResp = await fetch(`https://api.netlify.com/api/v1/deploys/${deployId}/files${filePath}`, {
        method: "PUT",
        headers: {
          "Authorization": `Bearer ${TOKEN}`,
          "Content-Type": ct
        },
        body: bytes
      });
      
      if (uploadResp.ok) {
        uploaded++;
        log(`✓ (${uploaded}/${required.length}) Uploaded: ${filePath}`);
      } else {
        const errText = await uploadResp.text();
        log(`✗ Failed: ${filePath} - ${uploadResp.status}: ${errText}`, "error");
      }
    }
    
    log(`
✅ DEPLOY COMPLETE! ${uploaded}/${required.length} files uploaded`);
    log(`🌐 URL: https://codigo-del-futuro.netlify.app`, "success");
    log("You can close this tab now.");
    
    // Store result for Claude to read
    document.title = "DONE: https://codigo-del-futuro.netlify.app";
    
  } catch(e) {
    log("FATAL ERROR: " + e.message, "error");
  }
}

window.addEventListener('load', deploy);
